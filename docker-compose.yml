version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: osin-db
    environment:
      - POSTGRES_USER=osin_user
      - POSTGRES_PASSWORD=osin_password
      - POSTGRES_DB=osin_intelligence
    ports:
      - "5432:5432"
    volumes:
      - osin_db_data:/var/lib/postgresql/data
    networks:
      - osin_network

  redis:
    image: redis:7-alpine
    container_name: osin-cache
    ports:
      - "6379:6379"
    networks:
      - osin_network

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: osin-streaming
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"
      - "8082:8082"
    networks:
      - osin_network

  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: osin-api
    depends_on:
      - db
      - redis
      - redpanda
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - osin_network

  worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: osin-worker
    command: celery -A app.workers.worker worker --loglevel=info
    depends_on:
      - redis
      - db
      - redpanda
    env_file:
      - .env
    networks:
      - osin_network

  monitoring:
    image: prom/prometheus:latest
    container_name: osin-monitor
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - osin_network

  grafana:
    image: grafana/grafana:latest
    container_name: osin-viz
    ports:
      - "3000:3000"
    depends_on:
      - monitoring
    networks:
      - osin_network

networks:
  osin_network:
    driver: bridge

volumes:
  osin_db_data:
