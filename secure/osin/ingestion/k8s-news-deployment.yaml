apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-ingestion
  namespace: osin-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: news-ingestion
  template:
    metadata:
      labels:
        app: news-ingestion
    spec:
      containers:
      - name: news-worker
        image: osin/news-ingestion:latest
        env:
        - name: KAFKA_BROKERS
          value: "kafka1:9092,kafka2:9093"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
