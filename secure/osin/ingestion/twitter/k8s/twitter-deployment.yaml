apiVersion: apps/v1
kind: Deployment
metadata:
  name: twitter-ingestion
  namespace: osin-production
  labels:
    app: twitter-ingestion
    component: ingestion
spec:
  replicas: 3
  selector:
    matchLabels:
      app: twitter-ingestion
  template:
    metadata:
      labels:
        app: twitter-ingestion
        component: ingestion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: twitter-snscrape
        image: osin/twitter-ingestion:latest
        env:
        - name: KAFKA_BROKERS
          value: "kafka-cluster-kafka-bootstrap:9092"
        - name: SEARCH_QUERIES
          value: "breaking news,emergency,crisis,disaster,protest,election"
        - name: LOG_LEVEL
          value: "INFO"
        - name: RATE_LIMIT_REQUESTS_PER_HOUR
          value: "1000"
        ports:
        - containerPort: 8080
          name: metrics
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: config-volume
        configMap:
          name: twitter-ingestion-config
      - name: secret-volume
        secret:
          secretName: twitter-api-secrets
