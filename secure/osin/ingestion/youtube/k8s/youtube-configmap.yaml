apiVersion: v1
kind: ConfigMap
metadata:
  name: youtube-ingestion-config
  namespace: osin-production
data:
  ingestion.yaml: |
    youtube:
      yt_dlp:
        enabled: true
        formats:
          - best[height<=720]
          - worst
        download_subtitles: true
      api:
        enabled: true
        quota_units_per_day: 10000
      content_sources:
        trending_regions: ["US", "GB", "DE", "FR", "JP"]
        search_keywords:
          - breaking news
          - emergency
          - crisis
          - disaster
          - protest
          - election
        monitored_channels:
          - UCXuqSBlHAE6Xw-yeJA0Tunw
          - UCBJycsmduvYEL83R_U4JriQ
          - UCsTcErHg8oDvUnTzoqsYeNw
    kafka:
      topics:
        videos: "raw.youtube.videos"
        comments: "raw.reddit.comments"
        metadata: "raw.youtube.metadata"
      batch_size: 1000
      compression: snappy
    monitoring:
      metrics_port: 8080
      health_check_interval: 30
