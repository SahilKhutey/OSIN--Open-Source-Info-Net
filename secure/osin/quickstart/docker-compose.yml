# FILE: secure/osin/quickstart/docker-compose.yml
version: '3.8'

services:
  # Kafka Cluster
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

  # Ingestion Workers
  twitter-ingestor:
    build: ../ingestion/twitter
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka

  reddit-ingestor:
    build: ../ingestion/reddit  
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka

  # Processing
  flink-jobmanager:
    image: flink:1.17.0
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager

  flink-taskmanager:
    image: flink:1.17.0
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager

  # Storage
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: osin
      POSTGRES_USER: osin
      POSTGRES_PASSWORD: osin123

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  # Dashboard
  dashboard:
    build: ../dashboard
    ports:
      - "8501:8501"
    depends_on:
      - postgres
      - qdrant
