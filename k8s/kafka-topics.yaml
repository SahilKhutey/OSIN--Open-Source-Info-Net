apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: osin-raw-satellite
  namespace: osin-system
  labels:
    strimzi.io/cluster: osin-kafka
spec:
  partitions: 10
  replicas: 3
  config:
    retention.ms: 604800000 
    cleanup.policy: "delete"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: osin-raw-social
  namespace: osin-system
  labels:
    strimzi.io/cluster: osin-kafka
spec:
  partitions: 15
  replicas: 3
  config:
    retention.ms: 86400000
    cleanup.policy: "delete"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: osin-processed-intelligence
  namespace: osin-system
  labels:
    strimzi.io/cluster: osin-kafka
spec:
  partitions: 20
  replicas: 3
  config:
    retention.ms: 2592000000 # 30 days for processed intel
    cleanup.policy: "compact,delete"
