apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nlp-processor-hpa
  namespace: osin-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nlp-processor
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      - type: Percent
        value: 20
        periodSeconds: 60
      stabilizationWindowSeconds: 0
      selectPolicy: Max
    scaleDown:
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
      stabilizationWindowSeconds: 300
