apiVersion: apps/v1
kind: Deployment
metadata:
  name: osin-mapillary
  namespace: osin
  labels:
    app: osin-mapillary
    version: 2.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: osin-mapillary
  template:
    metadata:
      labels:
        app: osin-mapillary
        version: 2.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8006"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: mapillary
        image: osin-mapillary:2.1.0
        ports:
        - containerPort: 8006
          name: http
        env:
        - name: MAPILLARY_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: mapillary-secret
              key: access-token
        - name: DEFAULT_RADIUS_M
          value: "100"
        - name: MAX_IMAGES
          value: "8"
        - name: REDIS_HOST
          value: "redis-master.osin.svc.cluster.local"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8006
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8006
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: osin-mapillary
  namespace: osin
spec:
  selector:
    app: osin-mapillary
  ports:
  - port: 8006
    targetPort: 8006
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: mapillary-secret
  namespace: osin
type: Opaque
data:
  # Placeholder: User needs to update with actual base64(token)
  access_token: TVBZX1BMQUNFSE9MREVS
