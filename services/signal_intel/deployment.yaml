apiVersion: apps/v1
kind: Deployment
metadata:
  name: osin-signal-intel
  namespace: osin
  labels:
    app: osin-signal-intel
    version: 2.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: osin-signal-intel
  template:
    metadata:
      labels:
        app: osin-signal-intel
        version: 2.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8016"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: signal-intel
        image: osin-signal-intel:2.1.0
        ports:
        - containerPort: 8016
          name: http
        env:
        - name: WIGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: signal-intel-secrets
              key: wigle-api-key
        - name: INTELX_API_KEY
          valueFrom:
            secretKeyRef:
              name: signal-intel-secrets
              key: intelx-api-key
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        securityContext:
          capabilities:
            add: ["NET_RAW", "NET_ADMIN"]
        livenessProbe:
          httpGet:
            path: /health
            port: 8016
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8016
          initialDelaySeconds: 20
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: osin-signal-intel
  namespace: osin
spec:
  selector:
    app: osin-signal-intel
  ports:
  - port: 8016
    targetPort: 8016
  type: ClusterIP
