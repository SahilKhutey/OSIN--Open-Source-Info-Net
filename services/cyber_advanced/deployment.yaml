apiVersion: apps/v1
kind: Deployment
metadata:
  name: osin-cyber-advanced
  namespace: osin
  labels:
    app: osin-cyber-advanced
    version: 2.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: osin-cyber-advanced
  template:
    metadata:
      labels:
        app: osin-cyber-advanced
        version: 2.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8015"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: cyber-advanced
        image: osin-cyber-advanced:2.1.0
        ports:
        - containerPort: 8015
          name: http
        env:
        - name: SHODAN_API_KEY
          valueFrom:
            secretKeyRef:
              name: cyber-advanced-secrets
              key: shodan-api-key
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        securityContext:
          capabilities:
            add: ["NET_RAW", "NET_ADMIN"]
        livenessProbe:
          httpGet:
            path: /health
            port: 8015
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8015
          initialDelaySeconds: 20
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: osin-cyber-advanced
  namespace: osin
spec:
  selector:
    app: osin-cyber-advanced
  ports:
  - port: 8015
    targetPort: 8015
  type: ClusterIP
