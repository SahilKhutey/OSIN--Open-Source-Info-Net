apiVersion: apps/v1
kind: Deployment
metadata:
  name: osin-pic2map
  namespace: osin
  labels:
    app: osin-pic2map
    version: 2.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: osin-pic2map
  template:
    metadata:
      labels:
        app: osin-pic2map
        version: 2.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8009"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: pic2map
        image: osin-pic2map:2.1.0
        ports:
        - containerPort: 8009
          name: http
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8009
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8009
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: osin-pic2map
  namespace: osin
spec:
  selector:
    app: osin-pic2map
  ports:
  - port: 8009
    targetPort: 8009
  type: ClusterIP
