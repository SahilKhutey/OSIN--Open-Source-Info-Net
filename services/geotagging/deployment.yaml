apiVersion: apps/v1
kind: Deployment
metadata:
  name: osin-geotagging
  namespace: osin
  labels:
    app: osin-geotagging
    version: 2.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: osin-geotagging
  template:
    metadata:
      labels:
        app: osin-geotagging
        version: 2.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: geotagging
        image: osin-geotagging:2.1.0
        ports:
        - containerPort: 8004
          name: http
        env:
        - name: MAX_LOCATIONS_PER_EVENT
          value: "5"
        - name: CACHE_TTL_HOURS
          value: "24"
        - name: REDIS_HOST
          value: "redis-master.osin.svc.cluster.local"
        resources:
          requests:
            memory: "1.5Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: osin-geotagging
  namespace: osin
spec:
  selector:
    app: osin-geotagging
  ports:
  - port: 8004
    targetPort: 8004
  type: ClusterIP
