apiVersion: apps/v1
kind: Deployment
metadata:
  name: osin-arcgis
  namespace: osin
  labels:
    app: osin-arcgis
    version: 2.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: osin-arcgis
  template:
    metadata:
      labels:
        app: osin-arcgis
        version: 2.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: arcgis
        image: osin-arcgis:2.1.0
        ports:
        - containerPort: 8005
          name: http
        env:
        - name: DEFAULT_RADIUS_KM
          value: "50"
        - name: MAX_FEATURES
          value: "20"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: osin-arcgis
  namespace: osin
spec:
  selector:
    app: osin-arcgis
  ports:
  - port: 8005
    targetPort: 8005
  type: ClusterIP
