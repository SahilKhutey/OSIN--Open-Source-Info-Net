apiVersion: apps/v1
kind: Deployment
metadata:
  name: osin-cyber-intel
  namespace: osin
  labels:
    app: osin-cyber-intel
    version: 2.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: osin-cyber-intel
  template:
    metadata:
      labels:
        app: osin-cyber-intel
        version: 2.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8014"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: cyber-intel
        image: osin-cyber-intel:2.1.0
        ports:
        - containerPort: 8014
          name: http
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "1000m"
        securityContext:
          capabilities:
            add: ["NET_RAW", "NET_ADMIN"] # Required for Nmap SYN scans
        livenessProbe:
          httpGet:
            path: /health
            port: 8014
          initialDelaySeconds: 45
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8014
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: osin-cyber-intel
  namespace: osin
spec:
  selector:
    app: osin-cyber-intel
  ports:
  - port: 8014
    targetPort: 8014
  type: ClusterIP
