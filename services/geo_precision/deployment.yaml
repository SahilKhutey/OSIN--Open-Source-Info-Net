apiVersion: apps/v1
kind: Deployment
metadata:
  name: osin-geo-precision
  namespace: osin
  labels:
    app: osin-geo-precision
    version: 2.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: osin-geo-precision
  template:
    metadata:
      labels:
        app: osin-geo-precision
        version: 2.1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8013"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: geo-precision
        image: osin-geo-precision:2.1.0
        ports:
        - containerPort: 8013
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8013
          initialDelaySeconds: 45
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8013
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: osin-geo-precision
  namespace: osin
spec:
  selector:
    app: osin-geo-precision
  ports:
  - port: 8013
    targetPort: 8013
  type: ClusterIP
