apiVersion: v1
kind: Namespace
metadata:
  name: osin-production
  labels:
    security-tier: "tier-1"
    classification: "restricted"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: osin-zero-trust
  namespace: osin-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: osin-ingestion
    ports:
    - protocol: TCP
      port: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-cluster
  namespace: osin-production
spec:
  serviceName: kafka
  replicas: 3
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.3.0
        ports:
        - containerPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-processor
  namespace: osin-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-processor
  template:
    metadata:
      labels:
        app: ai-processor
    spec:
      nodeSelector:
        accelerator: nvidia-tesla-t4
      containers:
      - name: ai-processor
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "8"
