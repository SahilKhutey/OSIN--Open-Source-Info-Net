[pytest]
# Asyncio configuration
asyncio_mode = auto

# Test discovery
testpaths = tests/
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Logging
log_cli = true
log_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    streaming: Streaming and Kafka tests
    ai: AI and ML model validation tests
    system: System and end-to-end tests
    ui: UI tests with Playwright
    load: Load and stress tests
    slow: Tests that take significant time
    requires_kafka: Tests that require Kafka running
    requires_external_api: Tests that require external services
