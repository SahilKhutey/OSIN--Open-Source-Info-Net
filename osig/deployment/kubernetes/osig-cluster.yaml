apiVersion: v1
kind: Namespace
metadata:
  name: osig-production
  labels:
    security-tier: "tier-0"
    classification: "top-secret"

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: osig-zero-trust
  namespace: osig-production
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
  - from: [{podSelector: {matchLabels: {component: "ingestion"}}}]
    ports: [{protocol: "TCP", port: 9092}]

---
apiVersion: v1
kind: Secret
metadata:
  name: osig-secrets
  namespace: osig-production
type: Opaque
data:
  kafka-password: "REDACTED"
  neo4j-password: "REDACTED"

---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: osig-kafka-cluster
  namespace: osig-production
spec:
  kafka:
    version: 3.4.0
    replicas: 5
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
    storage:
      type: jbod
      volumes: [{id: 0, type: "persistent-claim", size: "500Gi", deleteClaim: false}]
  zookeeper:
    replicas: 3
    storage:
      type: "persistent-claim"
      size: "100Gi"
      deleteClaim: false
  entityOperator:
    topicOperator: {}
    userOperator: {}

---
# Neo4j Graph Database Cluster
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j-cluster
  namespace: osig-production
spec:
  serviceName: neo4j
  replicas: 3
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      securityContext:
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
      containers:
      - name: neo4j
        image: neo4j:5.12.0-enterprise
        env:
        - name: NEO4J_AUTH
          valueFrom: {secretKeyRef: {name: osig-secrets, key: neo4j-password}}
        - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
          value: "yes"
        - name: NEO4J_dbms_mode
          value: "CORE"
        - name: NEO4J_causal__clustering_initial__discovery__members
          value: "neo4j-0.neo4j.osig-production.svc.cluster.local:5000,neo4j-1.neo4j.osig-production.svc.cluster.local:5000,neo4j-2.neo4j.osig-production.svc.cluster.local:5000"
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7687
          name: bolt
        resources:
          requests: {memory: "8Gi", cpu: "4"}
          limits: {memory: "16Gi", cpu: "8"}
        volumeMounts:
        - name: data
          mountPath: /data

---
# AI Processing Cluster (GPU Accelerated)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-processing-cluster
  namespace: osig-production
spec:
  replicas: 4
  selector:
    matchLabels:
      app: ai-processor
  template:
    metadata:
      labels:
        app: ai-processor
    spec:
      nodeSelector:
        accelerator: nvidia-tesla-a100
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: ai-processor
        image: osig/ai-processor:latest
        resources:
          limits: {nvidia.com/gpu: 2, memory: "64Gi", cpu: "16"}
          requests: {nvidia.com/gpu: 2, memory: "32Gi", cpu: "8"}
        env:
        - name: KAFKA_BROKERS
          value: "osig-kafka-cluster-kafka-bootstrap.osig-production.svc.cluster.local:9092"
        - name: NEO4J_URI
          value: "bolt://neo4j.osig-production.svc.cluster.local:7687"
        livenessProbe:
          exec:
            command: ["python", "-c", "import torch; print(torch.cuda.is_available())"]
          initialDelaySeconds: 120
        readinessProbe:
          httpGet: {path: /health, port: 8000}
        volumeMounts:
        - name: models
          mountPath: /models

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-processor-hpa
  namespace: osig-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-processing-cluster
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource: {name: cpu, target: {type: Utilization, averageUtilization: 70}}
  - type: Pods
    pods:
      metric: {name: processing_queue_length}
      target: {type: AverageValue, averageValue: 1000}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies: [{type: Pods, value: 4, periodSeconds: 60}]
